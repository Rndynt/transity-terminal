services:
  terminal:
    build:
      context: .
      dockerfile: Dockerfile
    image: transity-terminal:latest
    container_name: ${OPERATOR_SLUG:-default}-terminal
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TERMINAL_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - transity-net

networks:
  transity-net:
    external: true
    name: transity-net
