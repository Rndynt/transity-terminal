services:
  terminal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transity-terminal-nusa
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - transity-terminal-net

networks:
  transity-terminal-net:
    external: true
    name: transity-terminal-net
