services:
  terminal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transity-terminal-${OPERATOR_SLUG}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT}:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - OPERATOR_SLUG=${OPERATOR_SLUG}
      - NODE_OPTIONS=--dns-result-order=ipv4first
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - transity-terminals-net

networks:
  transity-terminals-net:
    external: true
    name: transity-terminals-net
