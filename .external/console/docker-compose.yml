services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transity-console
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
