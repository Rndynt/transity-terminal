kind = "web"
previewPath = "/__dev-vite"
title = "TransityConsole (Vite Dev)"
version = "1.0.0"
id = "artifacts/transity-console"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/__dev-vite" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/transity-console run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transity-console", "run", "build" ]
publicDir = "artifacts/transity-console/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
