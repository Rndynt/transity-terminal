# Nginx config untuk GCP e2-micro — TransityTerminal API
# Letakkan di: /etc/nginx/sites-available/transity-api
# Aktifkan: sudo ln -s /etc/nginx/sites-available/transity-api /etc/nginx/sites-enabled/
#
# Ganti `api.yourdomain.com` dengan domain/IP kamu.
# SSL via Let's Encrypt: sudo certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;

    # Let's Encrypt challenge (certbot akan otomatis tambah ini)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect semua HTTP → HTTPS setelah SSL aktif
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL — diisi otomatis oleh certbot, atau isi manual:
    # ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Ukuran body — sesuaikan dengan bodyLimit Fastify (1MB)
    client_max_body_size 2M;

    # ─── WebSocket (Socket.io) ───
    # Socket.io pakai path /socket.io/ — harus di-upgrade ke WS
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout panjang supaya WS connection tidak putus
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 75s;
    }

    # ─── REST API ───
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;

        # Standard timeout untuk API
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;
    }
}
