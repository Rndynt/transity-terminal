# ─────────────────────────────────────────────────────────────
# TEMPLATE per-operator Nginx config (Terminal only)
#
# App & Console SHARED (single instance) — config-nya di file
# app.conf dan console.conf, BUKAN di sini.
#
# File ini hanya men-generate vhost untuk Terminal whitelabel
# tiap operator (subdomain + port unik per mitra).
#
# Cara pakai (otomatis via deploy/add-operator.sh) atau manual:
#   sed -e 's/__OPERATOR__/nusa/g' \
#       -e 's/__DOMAIN__/transity.web.id/g' \
#       -e 's/__TERMINAL_PORT__/5000/g' \
#       deploy/nginx/_template-operator.conf \
#       > /etc/nginx/conf.d/terminal-nusa.conf
# ─────────────────────────────────────────────────────────────

upstream __OPERATOR___terminal {
    server 127.0.0.1:__TERMINAL_PORT__;
    keepalive 32;
}

server {
    listen 80;
    server_name terminal-__OPERATOR__.__DOMAIN__;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name terminal-__OPERATOR__.__DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/terminal-__OPERATOR__.__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terminal-__OPERATOR__.__DOMAIN__/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    # WAJIB: Upgrade headers untuk Socket.IO realtime CSO
    location /socket.io/ {
        proxy_pass http://__OPERATOR___terminal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://__OPERATOR___terminal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
