# ─────────────────────────────────────────────────────────────
# Transity Terminal (CSO + Backend API + Socket.IO)
#   Domain  : terminal.example.com
#   Upstream: 127.0.0.1:5000  (container `transity-terminal`)
#
# CRITICAL: blok /socket.io/ HARUS pakai Upgrade headers.
# Tanpa itu, Socket.IO fallback ke long-polling (event delay 0–25 detik).
# ─────────────────────────────────────────────────────────────

upstream terminal_upstream {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name terminal.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name terminal.example.com;

    ssl_certificate     /etc/letsencrypt/live/terminal.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/terminal.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    # ── Socket.IO (WebSocket) — WAJIB Upgrade headers ──────────
    location /socket.io/ {
        proxy_pass http://terminal_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # ── REST API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://terminal_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── React SPA (CSO + admin pages) ─────────────────────────
    location / {
        proxy_pass http://terminal_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
