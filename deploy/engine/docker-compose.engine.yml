# ─────────────────────────────────────────────
# Reservation Engine sidecar overlay
# ─────────────────────────────────────────────
# Stacked ON TOP of TransityTerminal's docker-compose.yml — does NOT replace it.
# Adds the `engine` service and injects engine env vars into `terminal`.
#
# Usage (manual):
#   docker compose -f docker-compose.yml -f deploy/engine/docker-compose.engine.yml up -d
#
# Or just run ./deploy.sh — it auto-layers this overlay when
# RESERVATION_ENGINE_ENABLED is set in .env (true OR false; the engine
# can run idle even with the flag off).
#
# Engine port 8000 is NEVER exposed to the host. Only `terminal` reaches it
# via the internal docker network at http://engine:8000.
# ─────────────────────────────────────────────

services:
  terminal:
    environment:
      - RESERVATION_ENGINE_ENABLED=${RESERVATION_ENGINE_ENABLED:-false}
      - RESERVATION_ENGINE_URL=http://engine:8000
      - RESERVATION_ENGINE_HMAC_SECRET=${RESERVATION_ENGINE_HMAC_SECRET}

  engine:
    image: ${ENGINE_IMAGE:-ghcr.io/rndynt/transity-engine}:${ENGINE_IMAGE_TAG:-latest}
    container_name: transity-engine-${OPERATOR_SLUG}
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - RUST_LOG=${ENGINE_LOG_LEVEL:-info}
      # Engine reads the SAME database TT uses by default.
      - ENGINE_DATABASE_URL=${ENGINE_DATABASE_URL:-${DATABASE_URL}}
      - RESERVATION_ENGINE_HMAC_SECRET=${RESERVATION_ENGINE_HMAC_SECRET}
      - HMAC_SKEW_SECS=${HMAC_SKEW_SECS:-30}
      - REAPER_INTERVAL_SECS=${REAPER_INTERVAL_SECS:-60}
      - DB_MIN_CONN=${DB_MIN_CONN:-2}
      - DB_MAX_CONN=${DB_MAX_CONN:-10}
      - IDEMPOTENCY_MAX=${IDEMPOTENCY_MAX:-10000}
      - REDIS_URL=${REDIS_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/api/v1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - transity-terminals-net
    # Intentionally NO depends_on — TT must boot independently of the
    # engine so a degraded engine can never block the operator's UI.

networks:
  transity-terminals-net:
    external: true
    name: transity-terminals-net
